name: Security Scan

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to scan'
        required: true
      reportId:
        description: 'Supabase report ID'
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🔴 IMPORTANT: Install dependencies before running the scanner
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # If you need JavaScript crawling (--js flag), also install Playwright:
          # playwright install chromium

      - name: Run scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          REPORT_ID: ${{ github.event.inputs.reportId }}
        run: |
          python scanner/secure1.py "${{ github.event.inputs.url }}" --report-id "${{ github.event.inputs.reportId }}"
